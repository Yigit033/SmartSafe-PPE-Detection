<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartSafe AI - Company Registration</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #1e3a8a;
        --secondary: #0ea5e9;
        --accent: #22c55e;
        --warning: #ef4444;
        --light: #f8fafc;
        --dark: #0f172a;
      }

      body {
        background: linear-gradient(
          135deg,
          var(--primary) 0%,
          var(--secondary) 100%
        );
        min-height: 100vh;
        font-family:
          "Segoe UI",
          system-ui,
          -apple-system,
          sans-serif;
        color: var(--dark);
        overflow-x: hidden;
      }

      .glass-card {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        transition: transform 0.3s ease;
      }

      .feature-icon {
        width: 60px;
        height: 60px;
        border-radius: 15px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        color: white;
        margin-bottom: 20px;
      }

      .gradient-bg {
        background: linear-gradient(
          135deg,
          var(--primary) 0%,
          var(--secondary) 100%
        );
      }

      .form-control-modern {
        border: 2px solid #e2e8f0;
        border-radius: 12px;
        padding: 12px 15px;
        transition: all 0.3s ease;
        background: #f8fafc;
      }

      .form-control-modern:focus {
        border-color: var(--secondary);
        box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.1);
        background: white;
        outline: none;
      }

      .btn-modern {
        border-radius: 12px;
        padding: 12px 25px;
        font-weight: 600;
        transition: all 0.3s ease;
      }

      /* Plan Kartları */
      .plan-card-modern {
        border: 2px solid #e2e8f0;
        border-radius: 15px;
        padding: 20px;
        cursor: pointer;
        transition: all 0.3s ease;
        position: relative;
        background: white;
        height: 100%;
      }

      .plan-card-modern:hover {
        border-color: var(--secondary);
        transform: translateY(-5px);
      }

      .plan-card-modern.selected {
        border-color: var(--primary);
        background: rgba(30, 58, 138, 0.03);
        box-shadow: 0 5px 15px rgba(30, 58, 138, 0.1);
      }

      .plan-card-modern.selected::after {
        content: "\f058";
        font-family: "Font Awesome 6 Free";
        font-weight: 900;
        position: absolute;
        top: 10px;
        right: 10px;
        color: var(--primary);
        font-size: 1.2rem;
      }
    </style>
  </head>
  <body>
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-10">
          <div class="glass-card p-4 p-md-5">
            <div class="text-center mb-5">
              <h2 class="fw-bold">Company Registration</h2>
              <p class="text-muted">Set up your SmartSafe AI account</p>
            </div>

            <form action="/api/register-form" method="POST">
              <!-- Industry Selection -->
              <div class="mb-4">
                <label class="form-label fw-bold">Industry</label>
                <select
                  name="sector"
                  class="form-control-modern w-100"
                  required
                  onchange="updatePPEOptions(this.value)"
                >
                  <option value="">Select your industry</option>
                  <option value="construction">🏗️ Construction</option>
                  <option value="manufacturing">🏭 Manufacturing</option>
                  <option value="food">🍕 Food & Beverage</option>
                  <option value="logistics">📦 Logistics</option>
                </select>
              </div>

              <!-- Company Info -->
              <div class="row mb-4">
                <div class="col-md-6 mb-3">
                  <label class="form-label fw-bold">Company Name</label>
                  <input
                    type="text"
                    name="company_name"
                    class="form-control-modern w-100"
                    required
                  />
                </div>
                <div class="col-md-6 mb-3">
                  <label class="form-label fw-bold">Admin Email</label>
                  <input
                    type="email"
                    name="email"
                    class="form-control-modern w-100"
                    required
                  />
                </div>
              </div>

              <!-- PPE Selection -->
              <div id="ppe-options" class="mb-5">
                <label class="form-label fw-bold mb-3"
                  >Required PPE for AI Detection</label
                >
                <div class="row g-3" id="ppe-grid">
                  <!-- Dynamic options here -->
                </div>
              </div>

              <div class="d-grid">
                <button type="submit" class="btn btn-primary btn-modern btn-lg">
                  Complete Registration
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script>
      function updatePPEOptions(sector) {
        const grid = document.getElementById("ppe-grid");
        grid.innerHTML = "";

        const ppeMap = {
          construction: ["Helmet", "Safety Vest", "Gloves", "Safety Shoes"],
          manufacturing: ["Helmet", "Ear Protection", "Gloves", "Safety Shoes"],
          food: ["Hair Net", "Face Mask", "Apron", "Gloves"],
        };

        const options = ppeMap[sector] || ["Helmet", "Safety Vest"];

        options.forEach((ppe) => {
          grid.innerHTML += `
                    <div class="col-md-4">
                        <div class="form-check p-3 border rounded-3 bg-light">
                            <input class="form-check-input" type="checkbox" name="required_ppe" value="${ppe.toLowerCase().replace(" ", "_")}" id="${ppe}" checked>
                            <label class="form-check-label fw-bold" for="${ppe}">${ppe}</label>
                        </div>
                    </div>
                `;
        });
      }
    </script>
  </body>
</html>
