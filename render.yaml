services:
  - type: web
    name: smartsafe-ppe-detection
    env: python
    region: oregon
    plan: starter
    buildCommand: |
      # Create required directories (use PWD for dynamic path)
      mkdir -p ./src/ssl ./src/data/models /tmp/Ultralytics
      chmod 755 ./src/ssl ./src/data 2>/dev/null || true
      chmod 777 /tmp/Ultralytics 2>/dev/null || true
      
      # Install dependencies with retry
      pip install --upgrade pip
      pip install --no-cache-dir --timeout 300 --retries 3 -r requirements.txt
      
      # Download models with retry logic
      echo "📥 Downloading models..."
      python download_models.py || echo "⚠️ Model download failed, will attempt lazy loading at runtime"
      
      # Verify models were downloaded
      ls -lah ./src/data/models/ 2>/dev/null || echo "Models directory will be populated at runtime"
      
      # Test network connectivity
      echo "🔍 Testing network connectivity..."
      ping -c 3 aws-0-us-west-1.pooler.supabase.com 2>/dev/null || echo "Ping failed but continuing..."
      
      # Test DNS resolution
      echo "🔍 Testing DNS resolution..."
      nslookup aws-0-us-west-1.pooler.supabase.com 2>/dev/null || echo "DNS lookup failed but continuing..."
      
      echo "✅ Build completed successfully"
    startCommand: gunicorn --config gunicorn.conf.py --bind 0.0.0.0:10000 --timeout 300 --access-logfile - --error-logfile - src.smartsafe.api.smartsafe_saas_api:app
    healthCheckPath: /health
    envVars:
      - key: RENDER
        value: "1"
      - key: FLASK_ENV
        value: production
      - key: FLASK_APP
        value: smartsafe_saas_api.py
      - key: PORT
        value: "10000"
      - key: PYTHONPATH
        value: ./src
      - key: CUDA_VISIBLE_DEVICES
        value: ""
      - key: YOLO_CONFIG_DIR
        value: /tmp/Ultralytics
      - key: DATABASE_URL
        value: postgresql://postgres.nbxntohihcwruwlnthfb:6818.yigit.98@aws-0-us-west-1.pooler.supabase.com:6543/postgres?sslmode=require
      - key: SUPABASE_URL
        value: aws-0-us-west-1.pooler.supabase.com
      - key: SUPABASE_PORT
        value: "6543"
      - key: SUPABASE_DB_NAME
        value: postgres
      - key: SUPABASE_USER
        value: postgres
      - key: SUPABASE_PASSWORD
        value: 6818.yigit.98
      - key: SSL_MODE
        value: require
      - key: GUNICORN_CMD_ARGS
        value: "--access-logfile - --error-logfile - --capture-output"
    disks:
      - name: smartsafe-data
        mountPath: /var/data
        sizeGB: 1
      - name: smartsafe-ssl
        mountPath: /var/ssl
        sizeGB: 1
    healthCheck:
      path: /health
      interval: 30s
      timeout: 15s
      gracePeriod: 60s
      startPeriod: 120s
    autoDeploy: true
    domains:
      - smartsafe-api.onrender.com
    
databases:
  - name: smartsafe-db
    databaseName: smartsafe_ppe
    user: smartsafe_user
    region: oregon
    plan: starter
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere 