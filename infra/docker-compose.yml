# SmartSafe AI Ekosistemi - Local Dev Setup
services:
  # 🐍 Flask Backend (Core)
  core:
    build:
      context: ..
      dockerfile: infra/Dockerfile.core
    container_name: smartsafe-core
    ports:
      - "5000:5000"
    volumes:
      - ../core:/app
      - ../storage:/app/storage
    environment:
      - FLASK_ENV=development
      - PORT=5000
      - PYTHONPATH=.
      - DATABASE_URL=postgres://smartsafe:smartsafe2024@postgres:5432/smartsafe_saas?sslmode=disable
      - YOLO_CONFIG_DIR=/tmp
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 3s
    depends_on:
      postgres:
        condition: service_healthy

  # ⚛️ Next.js Frontend
  frontend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.frontend
    container_name: smartsafe-frontend
    ports:
      - "3377:3377"
    volumes:
      - ../frontend:/app
      - ../storage:/app/public/storage
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
      - NODE_ENV=development
      - WATCHPACK_POLLING=1000
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      core:
        condition: service_healthy
      backend:
        condition: service_started

  # ⚡ Encore Backend (Microservices)
  backend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.backend
    container_name: smartsafe-backend-encore
    ports:
      - "4000:4000"
      - "9400:9400"
    volumes:
      - ../backend:/app
      - ../storage:/app/storage
      - /app/node_modules
    environment:
      - ENCORE_ENV=local
      - DATABASE_URL=postgres://smartsafe:smartsafe2024@postgres:5432/smartsafe_saas?sslmode=disable
      - ENCORE_DEVDASH_LISTEN_ADDR=0.0.0.0:9400
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  # 🐘 PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: smartsafe-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=smartsafe_saas
      - POSTGRES_USER=smartsafe
      - POSTGRES_PASSWORD=smartsafe2024
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartsafe -d smartsafe_saas"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # 🌐 CloudBeaver (Modern Database Dashboard)
  cloudbeaver:
    image: dbeaver/cloudbeaver:latest
    container_name: smartsafe-cloudbeaver
    restart: unless-stopped
    ports:
      - "5052:8978"
    volumes:
      - cloudbeaver_data:/opt/cloudbeaver/workspace
    depends_on:
      postgres:
        condition: service_healthy

  # 🔍 PgWeb (Database Browser) - Opsiyonel olarak tutuyoruz, istenirse tamamen silinebilir
  pgweb:
    image: sosedoff/pgweb
    container_name: smartsafe-pgweb
    restart: unless-stopped
    ports:
      - "5051:8081"
    environment:
      - PGWEB_DATABASE_URL=postgres://smartsafe:smartsafe2024@postgres:5432/smartsafe_saas?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  # 🔴 Redis Cache
  redis:
    image: redis:7-alpine
    container_name: smartsafe-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # 🎯 SmartSafe Developer Hub (Port Hub)
  hub:
    image: nginx:alpine
    container_name: smartsafe-hub
    ports:
      - "8080:80"
    volumes:
      - ./hub/index.html:/usr/share/nginx/html/index.html
    depends_on:
      core:
        condition: service_healthy
      frontend:
        condition: service_started
      backend:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  cloudbeaver_data:

networks:
  default:
    name: smartsafe-network
